<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Management</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="dashboard-container">

  <div class="topbar">
    <h2 class="header-glow">Admin Management</h2>
    <a href="/dashboard.html" class="logout-btn" style="text-decoration:none;">Back</a>
  </div>

  <div class="card glass-card" style="margin-top:15px;">
    <h3>Add Admin</h3>

    <input id="username" placeholder="Username">
    <input id="password" placeholder="Password">

    <div style="display:flex; gap:10px; align-items:center; margin-top:8px;">
      <select id="role" style="padding:10px;border-radius:8px;border:1px solid #ddd;">
        <option value="normal">Normal Admin</option>
        <option value="super">Super Admin</option>
      </select>

     <button id="addAdminBtn" type="button">Add Admin</button>
    </div>
  </div>

  <div class="card glass-card" style="margin-top:15px;">
    <h3>Admins List</h3>
    <div id="adminsList"></div>
  </div>

</div>

<div id="toast"></div>

<script src="toast.js"></script>
<script src="admins.js"></script>

</body>
</html>
